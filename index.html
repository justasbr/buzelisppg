<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matas Buzelis PPG Projection</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.3rem;
            color: #fff;
        }
        .subtitle {
            text-align: center;
            color: #8892a4;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .chart-wrapper {
            background: #131a2b;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #1e2a42;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: #131a2b;
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid #1e2a42;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #60a5fa;
        }
        .stat-value.highlight {
            color: #34d399;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #8892a4;
            margin-top: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .percentiles {
            background: #131a2b;
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            border: 1px solid #1e2a42;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .pct-item {
            text-align: center;
        }
        .pct-label {
            font-size: 0.7rem;
            color: #8892a4;
            text-transform: uppercase;
        }
        .pct-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #c4b5fd;
        }
        .footer {
            text-align: center;
            color: #4a5568;
            font-size: 0.75rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Matas Buzelis — End-of-Season PPG</h1>
        <p class="subtitle">Monte Carlo simulation · 10,000 runs · 58 GP, 24 remaining</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">15.0</div>
                <div class="stat-label">Current PPG</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">15.37</div>
                <div class="stat-label">Projected (Median)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value highlight">84.7%</div>
                <div class="stat-label">P(≥ 15 PPG)</div>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="bellCurve"></canvas>
        </div>

        <div class="percentiles">
            <div class="pct-item"><div class="pct-label">5th</div><div class="pct-value">14.78</div></div>
            <div class="pct-item"><div class="pct-label">25th</div><div class="pct-value">15.12</div></div>
            <div class="pct-item"><div class="pct-label">50th</div><div class="pct-value">15.37</div></div>
            <div class="pct-item"><div class="pct-label">75th</div><div class="pct-value">15.61</div></div>
            <div class="pct-item"><div class="pct-label">95th</div><div class="pct-value">15.96</div></div>
        </div>

        <p class="footer">Data from Basketball Reference · Simulation run Feb 25, 2026</p>
    </div>

    <script>
        const labels = [
            '14.4','14.4','14.5','14.6','14.7','14.7','14.8','14.9',
            '15.0','15.0','15.1','15.2','15.3','15.3','15.4','15.5',
            '15.6','15.6','15.7','15.8','15.9','15.9','16.0','16.1',
            '16.2','16.2','16.3','16.4'
        ];
        const data = [
            0.2,0.3,0.7,0.9,1.5,2.2,3.0,3.7,
            6.0,5.6,6.6,7.7,8.2,7.8,7.5,7.3,
            6.8,5.8,4.6,4.0,3.2,2.0,1.4,1.0,
            0.6,0.5,0.2,0.2
        ];

        // Color bars: below 15 = muted blue, at/above 15 = green-ish
        const threshold = 15.0;
        const colors = labels.map(l => parseFloat(l) >= threshold
            ? 'rgba(52, 211, 153, 0.7)'
            : 'rgba(96, 165, 250, 0.45)'
        );
        const borderColors = labels.map(l => parseFloat(l) >= threshold
            ? 'rgba(52, 211, 153, 1)'
            : 'rgba(96, 165, 250, 0.8)'
        );

        const ctx = document.getElementById('bellCurve').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    data,
                    backgroundColor: colors,
                    borderColor: borderColors,
                    borderWidth: 1,
                    borderRadius: 3,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2.2,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            title: ctx => `${ctx[0].label} PPG`,
                            label: ctx => `${ctx.raw}% of simulations`
                        },
                        backgroundColor: '#1e2a42',
                        titleColor: '#fff',
                        bodyColor: '#c4b5fd',
                        borderColor: '#334155',
                        borderWidth: 1,
                        cornerRadius: 8,
                        padding: 10
                    },
                    annotation: undefined
                },
                scales: {
                    x: {
                        title: { display: true, text: 'Projected Season PPG', color: '#8892a4', font: { size: 13 } },
                        ticks: { color: '#8892a4', maxRotation: 45, autoSkip: true, maxTicksLimit: 14 },
                        grid: { display: false }
                    },
                    y: {
                        title: { display: true, text: '% of Simulations', color: '#8892a4', font: { size: 13 } },
                        ticks: { color: '#8892a4', callback: v => v + '%' },
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    }
                }
            }
        });
    </script>
</body>
</html>
